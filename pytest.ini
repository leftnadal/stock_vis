[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*

# 테스트 디렉토리
testpaths = tests

# 마커 정의
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (database, cache)
    e2e: End-to-end tests (full system)
    slow: Slow tests (API calls, long processing)
    provider_consistency: Provider data consistency tests
    django_db: Tests that require database access

# pytest 옵션
addopts =
    --verbose
    --strict-markers
    --tb=short
    --maxfail=5
    --reuse-db
    -p no:warnings

# Coverage 설정
# (실행 시: pytest --cov=api_request --cov-report=html)

# 경고 필터
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::django.utils.deprecation.RemovedInDjango50Warning
