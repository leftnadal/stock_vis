components:
  schemas:
    ActionTypeEnum:
      enum:
      - watch
      - expand
      - alternatives
      - recheck
      - archive
      - resolve
      type: string
      description: |-
        * `watch` - Watch
        * `expand` - Expand
        * `alternatives` - Alternatives
        * `recheck` - Recheck
        * `archive` - Archive
        * `resolve` - Resolve
    AnomalyItem:
      type: object
      properties:
        rule_id:
          type: string
        headline:
          type: string
        threshold:
          type: object
          additionalProperties: {}
        actual:
          type: number
          format: double
        paired_news_id:
          type: integer
          nullable: true
      required:
      - actual
      - headline
      - paired_news_id
      - rule_id
      - threshold
    AnomalySection:
      type: object
      properties:
        mode:
          type: string
        overview:
          type: string
        sector_highlight:
          type: string
        portfolio_action:
          type: string
        fired:
          type: array
          items:
            $ref: '#/components/schemas/AnomalyItem'
      required:
      - fired
      - mode
      - overview
      - portfolio_action
      - sector_highlight
    BreadthCard:
      type: object
      properties:
        universe:
          type: string
        advance:
          type: integer
        decline:
          type: integer
        unchanged:
          type: integer
        total:
          type: integer
        new_high_52w:
          type: integer
        new_low_52w:
          type: integer
        ad_line:
          type: integer
        ad_line_change:
          type: integer
      required:
      - ad_line
      - ad_line_change
      - advance
      - decline
      - new_high_52w
      - new_low_52w
      - total
      - unchanged
      - universe
    BriefCard:
      type: object
      properties:
        headline:
          type: string
        content_preview:
          type: string
        status:
          type: string
        model_version:
          type: string
      required:
      - content_preview
      - headline
      - model_version
      - status
    Cards:
      type: object
      properties:
        regime:
          allOf:
          - $ref: '#/components/schemas/RegimeCard'
          nullable: true
        breadth:
          allOf:
          - $ref: '#/components/schemas/BreadthCard'
          nullable: true
        sector:
          allOf:
          - $ref: '#/components/schemas/SectorCard'
          nullable: true
        flow:
          allOf:
          - $ref: '#/components/schemas/FlowCard'
          nullable: true
        brief:
          allOf:
          - $ref: '#/components/schemas/BriefCard'
          nullable: true
      required:
      - breadth
      - brief
      - flow
      - regime
      - sector
    CoachE1RequestRequest:
      additionalProperties: false
      description: E1 GARP 스코어링 input.
      properties:
        portfolio_id:
          description: 포트폴리오 식별자.
          minLength: 1
          title: Portfolio Id
          type: string
        fetched_at:
          description: 데이터 수집 시점 (snapshot).
          format: date-time
          title: Fetched At
          type: string
        preset:
          allOf:
          - $ref: '#/components/schemas/PresetEnum'
          description: 투자 스타일 preset.
          title: Preset
        entry_point:
          const: e1
          default: e1
          title: Entry Point
          type: string
        holdings:
          description: 포트폴리오 보유 종목.
          items:
            additionalProperties: false
            description: |-
              포트폴리오 보유 종목 (6 진입점 공통 type).

              Slice 8 H2 ActionItem 패턴 응용 — 같은 자산 클래스를 1회 정의 + 6 sub class 재사용.
            properties:
              ticker:
                description: 종목 ticker (대문자).
                maxLength: 10
                minLength: 1
                title: Ticker
                type: string
              weight:
                description: 포트폴리오 비중 (0.0 ~ 1.0).
                maximum: 1.0
                minimum: 0.0
                title: Weight
                type: number
              sector:
                anyOf:
                - type: string
                - type: 'null'
                default: null
                description: 섹터 라벨 (선택).
                title: Sector
              asset_class:
                anyOf:
                - enum:
                  - stock
                  - etf
                  - bond
                  - cash
                  type: string
                - type: 'null'
                default: null
                description: 자산 클래스 (선택).
                title: Asset Class
              name:
                anyOf:
                - type: string
                - type: 'null'
                default: null
                description: 종목 명 (선택, UI 표시용).
                title: Name
            required:
            - ticker
            - weight
            title: Holding
            type: object
          minItems: 1
          title: Holdings
          type: array
        garp_metrics:
          additionalProperties:
            additionalProperties: true
            type: object
          description: '종목별 GARP 지표 dict — {ticker: {per, peg, roe, ...}}.'
          title: Garp Metrics
          type: object
      required:
      - portfolio_id
      - fetched_at
      - preset
      - holdings
      - garp_metrics
      title: CommentaryInputE1
      type: object
    CoachE1Response:
      additionalProperties: false
      description: E1 GARP 스코어링 output.
      properties:
        summary:
          description: 진입점별 commentary 한 줄 요약.
          minLength: 1
          title: Summary
          type: string
        key_observations:
          description: 핵심 관찰 사항 list (자유 길이).
          items:
            type: string
          title: Key Observations
          type: array
        confidence:
          allOf:
          - $ref: '#/components/schemas/ConfidenceEnum'
          description: 결과 자신도 (high/medium/low).
          title: Confidence
        action_items:
          items:
            description: |-
              LLM commentary의 실행 가능 액션 항목.

              모든 진입점(E1~E6, E3_portfolio)의 output schema에 강제 슬롯으로 포함.
              빈 리스트 허용 (backward-compat).

              Examples:
                  >>> ActionItem(
                  ...     title="현금 비중 5% 축소",
                  ...     description="포트폴리오 현금 비중이 25%로 과도. 우량 종목 추가 매수 검토.",
                  ...     priority="high",
                  ... )
            properties:
              title:
                description: 액션 제목 (간결, 1줄)
                maxLength: 80
                minLength: 1
                title: Title
                type: string
              description:
                description: 액션 상세 설명 (근거 + 실행 방법)
                maxLength: 300
                minLength: 10
                title: Description
                type: string
              priority:
                default: medium
                description: 우선순위 (high=즉시, medium=단기, low=장기)
                enum:
                - high
                - medium
                - low
                title: Priority
                type: string
              category:
                anyOf:
                - enum:
                  - rebalance
                  - review
                  - monitor
                  - research
                  type: string
                - type: 'null'
                default: null
                description: 카테고리 (선택). rebalance=재조정, review=검토, monitor=감시, research=조사
                title: Category
            required:
            - title
            - description
            title: ActionItem
            type: object
          title: Action Items
          type: array
        risk_flags:
          items:
            type: string
          title: Risk Flags
          type: array
        metrics_table:
          default: ''
          description: '(deprecated #21, Slice 13+ 제거 예정) 마크다운 metrics 표.'
          title: Metrics Table
          type: string
      required:
      - summary
      - confidence
      title: E1Output
      type: object
    CoachE2RequestRequest:
      additionalProperties: false
      description: E2 포트폴리오 종합 진단 input.
      properties:
        portfolio_id:
          description: 포트폴리오 식별자.
          minLength: 1
          title: Portfolio Id
          type: string
        fetched_at:
          description: 데이터 수집 시점 (snapshot).
          format: date-time
          title: Fetched At
          type: string
        preset:
          allOf:
          - $ref: '#/components/schemas/PresetEnum'
          description: 투자 스타일 preset.
          title: Preset
        entry_point:
          const: e2
          default: e2
          title: Entry Point
          type: string
        holdings:
          description: 포트폴리오 보유 종목.
          items:
            additionalProperties: false
            description: |-
              포트폴리오 보유 종목 (6 진입점 공통 type).

              Slice 8 H2 ActionItem 패턴 응용 — 같은 자산 클래스를 1회 정의 + 6 sub class 재사용.
            properties:
              ticker:
                description: 종목 ticker (대문자).
                maxLength: 10
                minLength: 1
