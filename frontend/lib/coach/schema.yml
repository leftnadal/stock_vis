  /api/v1/coach/e1/:
    post:
      operationId: coach_e1_create
      description: |-
        POST /api/coach/e1/

        Body (JSON): `CommentaryInputE1` schema 필드 (portfolio_id, fetched_at,
        preset, holdings, garp_metrics 등).
        Query: provider=haiku (기본) | sonnet | anthropic.

        응답:
          - 200: `{output: E1Output, llm_metadata: {...}}`
          - 400: 요청 검증 실패 (Pydantic 에러 평탄화)
          - 500: service 예외 (스택트레이스 노출 금지)
      tags:
      - coach
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoachE1RequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CoachE1RequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CoachE1RequestRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoachE1Response'
          description: ''
  /api/v1/coach/e2/:
    post:
      operationId: coach_e2_create
      description: |-
        POST /api/v1/coach/e2/

        Body: `CommentaryInputE2` schema 필드 (portfolio_id, fetched_at, preset,
        holdings, portfolio_return_1y, sector_allocation).
        Query: provider=haiku (기본) | sonnet | anthropic.

        응답: `{output: E2Output, llm_metadata: {...}}`
