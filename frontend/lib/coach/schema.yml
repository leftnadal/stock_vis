openapi: 3.0.3
info:
  title: Stock-Vis Market Pulse v2 API
  version: '2.0'
  description: Market Pulse v2 Phase 1 — 시장 레짐 + 시장 폭 + 섹터 흐름 + 집중도 + LLM 브리핑 + 이상
    신호. JWT Bearer 인증. 응답 본체는 영문 키 (한글은 /i18n endpoint).
paths:
  /api/v1/admin/providers/cache/:
    get:
      operationId: admin_providers_cache_retrieve
      description: 캐시 통계 조회
      summary: Provider 캐시 관리
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: 캐시 통계 / 무효화 결과
    delete:
      operationId: admin_providers_cache_destroy
      description: 캐시 무효화
      summary: Provider 캐시 관리
      tags:
      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: 캐시 통계 / 무효화 결과
  /api/v1/admin/providers/config/:
    get:
