      - admin
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: feature_flags/cache_ttl/rate_limits/fallback_enabled
  /api/v1/admin/providers/rate-limits/:
    get:
      operationId: admin_providers_rate_limits_retrieve
      description: 모든 Provider의 Rate Limit 상태
      summary: Rate Limit 상태 조회 / 리셋
      tags:
      - admin
