<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup 5: Glitch Critical State</title>
    <style>
        :root { --bg: #000; --text: #fff; --glitch-red: #ff003c; --glitch-blue: #00e5ff; }
        body { margin:0; padding:2rem; background:#111; color:var(--text); font-family:"Courier New", monospace; display:flex; justify-content:center; align-items:center; height:100vh; gap: 2rem;}
        .phone { width:375px; height:812px; background:var(--bg); border-radius:40px; overflow:hidden; position:relative; box-shadow:0 0 0 10px #222; border:1px solid #333; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        
        .alert-box {
            border: 2px solid var(--glitch-red);
            padding: 30px 20px;
            text-align: center;
            position: relative;
            background: rgba(255, 0, 60, 0.1);
            width: 80%;
        }

        .glitch-text {
            font-size: 2rem;
            font-weight: bold;
            position: relative;
            display: inline-block;
            text-transform: uppercase;
        }

        .glitch-text::before, .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 var(--glitch-red);
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -2px 0 var(--glitch-blue);
            clip-path: polygon(0 80%, 100% 20%, 100% 100%, 0 100%);
            animation: glitch-anim2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip-path: polygon(0 2%, 100% 2%, 100% 5%, 0 5%); }
            20% { clip-path: polygon(0 15%, 100% 15%, 100% 15%, 0 15%); }
            40% { clip-path: polygon(0 10%, 100% 10%, 100% 20%, 0 20%); }
            60% { clip-path: polygon(0 80%, 100% 80%, 100% 80%, 0 80%); }
            80% { clip-path: polygon(0 30%, 100% 30%, 100% 30%, 0 30%); }
            100% { clip-path: polygon(0 50%, 100% 50%, 100% 59%, 0 59%); }
        }
        @keyframes glitch-anim2 {
            0% { clip-path: polygon(0 25%, 100% 25%, 100% 30%, 0 30%); }
            20% { clip-path: polygon(0 3%, 100% 3%, 100% 3%, 0 3%); }
            40% { clip-path: polygon(0 50%, 100% 50%, 100% 20%, 0 20%); }
            60% { clip-path: polygon(0 20%, 100% 20%, 100% 20%, 0 20%); }
            80% { clip-path: polygon(0 80%, 100% 80%, 100% 80%, 0 80%); }
            100% { clip-path: polygon(0 70%, 100% 70%, 100% 70%, 0 70%); }
        }

        .terminal-log {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #0f0;
            text-align: left;
            width: 100%;
        }

        .crt-overlay {
            position: absolute;
            top:0; left:0; right:0; bottom:0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            z-index: 100;
        }

    </style>
</head>
<body>
    <div class="phone">
        <div class="crt-overlay"></div>
        <div class="alert-box">
            <div class="glitch-text" data-text="CRITICAL">CRITICAL</div>
            <p style="margin-top:20px; color:var(--glitch-red);">가설 붕괴 위험 감지</p>
        </div>
        
        <div class="terminal-log" id="log">
            > Analyzing indicators...<br>
            > [WARN] Foreign net buying dropped.<br>
            > [FATAL] Threshold breached. 
        </div>
    </div>
    
    <div style="color:white; width:300px; padding:20px; background:#222; border-radius:12px;">
        <h3>#5. Glitch / Critical State</h3>
        <p>내 가설이 심각한 위협(반박 지표 급증)을 받을 때, 평범한 빨간 경고창 대신 '해킹/시스템 오류' 느낌의 글리치(Glitch) 이펙트로 직관적이고 강력한 피드백을 줍니다.</p>
    </div>

    <script>
        const log = document.getElementById('log');
        const msgs = [
            "> Re-evaluating premise 1...",
            "> Premise invalidated: Target hit.",
            "> <b>RECOMMENDATION: CLOSE THESIS</b>",
        ];
        let i = 0;
        setInterval(() => {
            if(i < msgs.length) {
                log.innerHTML += '<br>' + msgs[i];
                i++;
            }
        }, 1500);
    </script>
</body>
</html>
