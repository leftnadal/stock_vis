<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup 1: Story-like Onboarding</title>
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; --accent: #3b82f6; --accent-hover: #2563eb; }
        body { margin:0; padding:2rem; background:#000; color:var(--text); font-family:system-ui; display:flex; justify-content:center; align-items:center; height:100vh; }
        .phone { width:375px; height:812px; background:var(--bg); border-radius:40px; overflow:hidden; position:relative; box-shadow:0 0 0 10px #222; border:1px solid #333; display:flex; flex-direction:column; }
        .chat-area { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:16px; scroll-behavior: smooth; }
        .bubble { max-width:80%; padding:12px 16px; border-radius:20px; font-size:0.95rem; line-height:1.4; opacity:0; transform:translateY(20px); animation:popIn 0.4s forwards; }
        .ai { background:#1e293b; color:#cbd5e1; align-self:flex-start; border-bottom-left-radius:4px; }
        .user { background:var(--accent); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; display:none; }
        .user.show { display:block; }
        .choices { padding:20px; background:linear-gradient(to top, var(--bg) 80%, transparent); display:flex; flex-wrap:wrap; gap:10px; }
        .choice-btn { flex:1 1 calc(50% - 5px); min-width:fit-content; background:#1e293b; border:1px solid #334155; color:#f8fafc; padding:12px; border-radius:12px; cursor:pointer; font-size:0.9rem; transition:0.2s; text-align:center; }
        .choice-btn:active { transform:scale(0.95); background:#334155; }
        @keyframes popIn { to { opacity:1; transform:translateY(0); } }
        /* Typing indicator */
        .typing { display:flex; gap:4px; padding:12px 16px; background:#1e293b; border-radius:20px; width:fit-content; border-bottom-left-radius:4px; display:none; }
        .typing.show { display:flex; }
        .dot { width:6px; height:6px; background:#64748b; border-radius:50%; animation:bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay:-0.32s; } .dot:nth-child(2) { animation-delay:-0.16s; }
        @keyframes bounce { 0%,80%,100% { transform:scale(0); } 40% { transform:scale(1); } }
    </style>
</head>
<body>
    <div class="phone">
        <div class="chat-area" id="chat">
            <div class="bubble ai" style="animation-delay:0.2s">오늘 코스피가 2,800을 돌파했네요. 이 흐름, 어떻게 보시나요?</div>
        </div>
        <div class="typing" id="typing">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="choices" id="choicesBox">
            <button class="choice-btn" onclick="selectChoice('계속 오를 것 같아')">📈 계속 오를 것 같아</button>
            <button class="choice-btn" onclick="selectChoice('곧 꺾일 것 같아')">📉 곧 꺾일 것 같아</button>
            <button class="choice-btn" onclick="selectChoice('잘 모르겠어')">🤔 잘 모르겠어</button>
        </div>
    </div>
    <div style="color:white; width:300px; padding:20px;">
        <h3>#1. Story-like Onboarding</h3>
        <p>기존의 딱딱한 폼 입력 대신, AI와 대화하듯이 탭 몇 번으로 가설을 완성하는 경험입니다. (챗봇 UI)</p>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const typing = document.getElementById('typing');
        const choicesBox = document.getElementById('choicesBox');

        const script = {
            step1: {
                ai: "왜 그렇게 생각하시나요? 여러 개 골라도 돼요.",
                choices: ["선거 기대감 소멸", "기업 실적 부진", "외국인 매도", "직접 입력"]
            },
            step2: {
                ai: "정리해볼게요.<br><b>📌 KOSPI 하락</b><br>전제: 선거 기대감 소멸<br><br>관련된 지표(외국인 순매수 추이 등)를 AI가 자동으로 세팅해둘게요.",
                choices: ["관제실 보기", "알림 설정"]
            }
        };
        let currentStep = 1;

        function addBubble(text, sender) {
            const div = document.createElement('div');
            div.className = `bubble ${sender}`;
            div.innerHTML = text;
            chat.appendChild(div);
            // Move typing indicator down
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;
        }

        function selectChoice(text) {
            choicesBox.style.display = 'none';
            addBubble(text, 'user');
            
            setTimeout(() => {
                typing.classList.add('show');
                chat.scrollTop = chat.scrollHeight;
            }, 500);

            setTimeout(() => {
                typing.classList.remove('show');
                const next = script['step'+currentStep];
                if(next) {
                    addBubble(next.ai, 'ai');
                    choicesBox.innerHTML = '';
                    next.choices.forEach(c => {
                        const btn = document.createElement('button');
                        btn.className = 'choice-btn';
                        btn.textContent = c;
                        btn.onclick = () => selectChoice(c);
                        choicesBox.appendChild(btn);
                    });
                    choicesBox.style.display = 'flex';
                    currentStep++;
                }
            }, 1500);
        }
    </script>
</body>
</html>
